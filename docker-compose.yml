services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: apipure-cart-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      # Mount source for hot-reload in development
      - ./app:/app/app
    command: >
      uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    restart: unless-stopped
